{% extends 'base.html' %}
{% block content %}
<h1>Delete Action</h1>
<p>Are you sure you want to delete "{{ action.description }}"?</p>
<form action="" method="post">
  {% csrf_token %}
  <button type="submit">Yes, delete</button>
</form>
<a href="{% url 'observation-detail' action.observation.id %}">Cancel</a>
{% endblock %}
